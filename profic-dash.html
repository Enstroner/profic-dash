<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROFiC DASH - Stereo Madness</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            color: white;
        }
        canvas {
            display: block;
            margin: 0 auto;
            image-rendering: pixelated;
        }
        #ui {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 0 0 15px #00ffff;
            pointer-events: none;
        }
        #musicInfo {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: #00ffff;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="ui">Score: <span id="score">0</span> | High: <span id="highscore">0</span></div>
    <div id="musicInfo">♪ Stereo Madness - ForeverBound</div>
    
    <canvas id="game" width="1000" height="500"></canvas>

    <!-- Audio -->
    <audio id="bgMusic" loop>
        <!-- Replace with a direct link to Stereo Madness audio if you have one -->
        <!-- For now it will be silent until you add a working URL -->
    </audio>

    <!-- Start Screen -->
    <div id="startScreen" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; z-index:200; background:rgba(0,0,0,0.95); padding:40px 60px; border-radius:20px; border:3px solid #00ffff;">
        <h1 style="font-size:52px; margin:0; color:#00ffff;">PROFiC DASH</h1>
        <p style="margin:10px 0 20px; font-size:20px;">Stereo Madness</p>
        <button onclick="startGame()" style="padding:16px 50px; font-size:24px;">PLAY WITH MUSIC</button>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const music = document.getElementById('bgMusic');
        let score = 0, highscore = localStorage.getItem('gdHigh') || 0;
        document.getElementById('highscore').textContent = highscore;

        let player = { x: 120, y: 300, size: 45, vy: 0, mode: 'cube', rotation: 0 };
        let gravity = 0.85, jumpPower = -17, gameSpeed = 7;
        let obstacles = [], particles = [], gameRunning = false;
        let frame = 0;

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            resetGame();
            gameRunning = true;

            // Try to play music
            music.play().catch(() => {
                console.log("Click again to enable music (browser policy)");
            });

            requestAnimationFrame(gameLoop);
        }

        function resetGame() {
            score = 0;
            obstacles = [];
            particles = [];
            player.y = 300;
            player.vy = 0;
            player.mode = 'cube';
            gameSpeed = 7;
        }

        function gameOver() {
            gameRunning = false;
            music.pause();
            if (score > highscore) {
                highscore = score;
                localStorage.setItem('gdHigh', highscore);
            }
            alert("Game Over! Score: " + score);
            document.getElementById('startScreen').style.display = 'block';
        }

        // Controls (same as before)
        let isHolding = false;
        document.addEventListener('keydown', e => {
            if (e.code === 'Space') { e.preventDefault(); isHolding = true; if (player.mode === 'cube' && !player.jumping) jump(); }
        });
        document.addEventListener('keyup', e => { if (e.code === 'Space') isHolding = false; });

        canvas.addEventListener('mousedown', () => { isHolding = true; jump(); });
        canvas.addEventListener('mouseup', () => isHolding = false);
        canvas.addEventListener('touchstart', e => { e.preventDefault(); isHolding = true; jump(); });
        canvas.addEventListener('touchend', () => isHolding = false);

        function jump() {
            if (!gameRunning) return;
            if (player.mode === 'cube' && !player.jumping) {
                player.vy = jumpPower;
                player.jumping = true;
                createParticles(player.x + 20, player.y + 40, 12, '#00ffff');
            }
        }

        function createParticles(x, y, count, color) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x, y,
                    vx: Math.random()*8 - 4,
                    vy: Math.random()*-7 - 3,
                    life: 30,
                    color
                });
            }
        }

        function spawnObstacle() {
            if (frame % 50 === 0) {
                const isSpike = Math.random() > 0.4;
                obstacles.push({
                    x: canvas.width + 30,
                    y: isSpike ? 335 : 260,
                    width: isSpike ? 38 : 52,
                    height: isSpike ? 65 : 55,
                    type: isSpike ? 'spike' : 'block'
                });
            }
        }

        function gameLoop() {
            if (!gameRunning) return;

            // Background
            ctx.fillStyle = '#0a001f';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Ground
            ctx.fillStyle = '#00cc88';
            ctx.fillRect(0, 380, canvas.width, 120);

            // Player Mode
            if (isHolding && player.mode === 'cube' && player.jumping) player.mode = 'ship';
            else if (!isHolding && player.mode === 'ship') player.mode = 'cube';

            // Physics
            if (player.mode === 'cube') {
                player.vy += gravity;
                player.y += player.vy;
                player.rotation = Math.min(Math.max(player.vy * 5, -35), 35);
            } else {
                player.vy = isHolding ? -9.5 : 7;
                player.y += player.vy;
                player.rotation += 10;
            }

            if (player.y > 335) { player.y = 335; player.vy = 0; player.jumping = false; }
            if (player.y < 60) player.y = 60;

            // Draw Player
            ctx.save();
            ctx.translate(player.x + player.size/2, player.y + player.size/2);
            ctx.rotate(player.rotation * Math.PI / 180);
            ctx.fillStyle = player.mode === 'cube' ? '#ff0088' : '#00ddff';
            ctx.fillRect(-player.size/2, -player.size/2, player.size, player.size);
            ctx.fillStyle = '#fff';
            ctx.fillRect(-12, -14, 14, 14);
            ctx.restore();

            // Obstacles
            spawnObstacle();
            for (let i = obstacles.length-1; i >= 0; i--) {
                let o = obstacles[i];
                o.x -= gameSpeed;

                ctx.fillStyle = o.type === 'spike' ? '#ff3366' : '#ffaa33';
                ctx.fillRect(o.x, o.y, o.width, o.height);

                if (player.x + player.size - 12 > o.x && player.x + 12 < o.x + o.width &&
                    player.y + player.size - 12 > o.y && player.y + 12 < o.y + o.height) {
                    createParticles(player.x, player.y, 30, '#ff0000');
                    gameOver();
                    return;
                }

                if (o.x < -100) obstacles.splice(i, 1);
            }

            // Particles
            for (let i = particles.length-1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy; p.vy += 0.4; p.life--;
                ctx.globalAlpha = p.life / 30;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 7, 7);
                if (p.life <= 0) particles.splice(i, 1);
            }
            ctx.globalAlpha = 1;

            score += 1;
            document.getElementById('score').textContent = score;
            if (score % 500 === 0) gameSpeed += 0.5;

            frame++;
            requestAnimationFrame(gameLoop);
        }

        // Auto play music when game starts
    </script>
</body>
</html>
